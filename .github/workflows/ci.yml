# ==============================================================
# HSM Scenario Builder -- CI Pipeline
# Runs on every PR and push to main: lint, type-check, and test.
# ==============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('azure_functions/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r azure_functions/requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: |
          ruff check azure_functions/ --output-format=github

      - name: Type check with mypy
        run: |
          mypy azure_functions/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # Non-blocking for initial setup
